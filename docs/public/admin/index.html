<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库后台 · Bit东</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f1117; --bg2: #161b27; --bg3: #1e2535; --bg4: #242c3f;
  --border: #2a3147; --accent: #7c3aed; --accent2: #a855f7;
  --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
  --text: #e2e8f0; --text2: #94a3b8; --text3: #64748b;
  --radius: 8px;
}
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }

/* ══ 登录页 ══ */
#login-page {
  position: fixed; inset: 0; background: var(--bg);
  display: flex; align-items: center; justify-content: center; z-index: 9999;
  background-image: radial-gradient(ellipse at 50% 0%, rgba(124,58,237,.15) 0%, transparent 60%);
}
.login-box {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 16px; padding: 40px 36px; width: 360px;
  box-shadow: 0 24px 80px rgba(0,0,0,.6);
}
.login-logo { font-size: 40px; text-align: center; margin-bottom: 8px; }
.login-title { text-align: center; font-size: 20px; font-weight: 700; margin-bottom: 4px; }
.login-sub { text-align: center; font-size: 13px; color: var(--text3); margin-bottom: 28px; }
.login-input {
  width: 100%; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; color: var(--text);
  font-size: 15px; margin-bottom: 14px; letter-spacing: .1em;
}
.login-input:focus { outline: none; border-color: var(--accent); }
.login-btn {
  width: 100%; background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 10px; padding: 13px;
  font-size: 15px; font-weight: 700; cursor: pointer; transition: all .2s;
}
.login-btn:hover { opacity: .88; transform: translateY(-1px); }
.login-err { color: var(--red); font-size: 12px; text-align: center; margin-top: 10px; min-height: 18px; }

/* ══ 主界面 ══ */
#app { display: none; flex-direction: column; height: 100vh; }

/* 顶栏 */
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 0 20px; height: 54px; display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
.topbar .logo { font-size: 18px; font-weight: 800; color: var(--accent2); margin-right: 6px; letter-spacing: -.02em; }
.nav-btn {
  padding: 6px 14px; border-radius: 20px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 500; transition: all .2s;
  background: transparent; color: var(--text2);
}
.nav-btn:hover { background: var(--bg3); color: var(--text); }
.nav-btn.active { background: var(--accent); color: #fff; }
.spacer { flex: 1; }
.topbar .logout { background: none; border: 1px solid var(--border); color: var(--text3); border-radius: 8px; padding: 5px 12px; cursor: pointer; font-size: 12px; transition: all .2s; }
.topbar .logout:hover { border-color: var(--red); color: var(--red); }
.topbar .quick-deploy {
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff; border: none; border-radius: 20px; padding: 7px 16px;
  font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s;
}
.topbar .quick-deploy:hover { opacity: .85; transform: translateY(-1px); }

.main { flex: 1; overflow: hidden; display: flex; }
.view { display: none; flex: 1; overflow: hidden; }
.view.active { display: flex; }

/* ══ 文章列表 ══ */
.list-view { flex-direction: column; overflow-y: auto; padding: 24px; gap: 18px; }
.list-header { display: flex; align-items: center; gap: 10px; }
.list-header h2 { font-size: 20px; font-weight: 700; }
.badge { background: var(--bg3); color: var(--text2); padding: 3px 10px; border-radius: 20px; font-size: 12px; }
.search-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 9px 14px; display: flex; align-items: center; gap: 8px; }
.search-wrap input { background: none; border: none; outline: none; color: var(--text); font-size: 14px; flex: 1; }
.search-wrap input::placeholder { color: var(--text3); }
.new-btn { background: var(--green); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .2s; white-space: nowrap; }
.new-btn:hover { opacity: .85; transform: translateY(-1px); }

.cat-section { }
.cat-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); padding: 4px 0 10px; display: flex; align-items: center; gap: 8px; }
.cat-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }
.articles-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 8px; }
.a-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; cursor: pointer; transition: all .2s; position: relative; overflow: hidden;
}
.a-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--accent); opacity: 0; transition: opacity .2s; }
.a-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(124,58,237,.12); }
.a-card:hover::before { opacity: 1; }
.a-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 5px; }
.a-path { font-size: 11px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.a-meta { font-size: 11px; color: var(--text3); display: flex; gap: 8px; margin-top: 4px; }
.a-actions { position: absolute; top: 8px; right: 8px; display: flex; gap: 4px; opacity: 0; transition: opacity .2s; }
.a-card:hover .a-actions { opacity: 1; }
.a-btn { padding: 3px 7px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: 500; }
.a-btn.edit { background: var(--accent); color: #fff; }
.a-btn.del { background: #3a1a1a; color: var(--red); }
.loading-text { color: var(--text3); font-size: 14px; text-align: center; padding: 40px; }

/* ══ 编辑器 ══ */
.editor-view { flex-direction: row; }
.editor-nav {
  width: 210px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
}
.editor-nav .nav-head { padding: 14px 14px 10px; font-size: 12px; font-weight: 700; color: var(--text3); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.editor-nav .nav-body { flex: 1; overflow-y: auto; padding: 6px; }
.nav-cat { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text3); padding: 8px 8px 4px; }
.nav-item { padding: 5px 10px; border-radius: 6px; font-size: 12px; color: var(--text2); cursor: pointer; transition: all .15s; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: var(--accent); color: #fff; }

.editor-body { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.editor-toolbar {
  padding: 10px 14px; background: var(--bg2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
.path-field {
  background: var(--bg3); border: 1px solid var(--border); border-radius: 6px;
  padding: 5px 10px; color: var(--text); font-size: 12px; font-family: 'SF Mono', monospace;
  flex: 1; max-width: 360px;
}
.path-field:focus { outline: none; border-color: var(--accent); }
.t-btn { padding: 6px 13px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 600; transition: all .2s; }
.t-btn.save { background: var(--accent); color: #fff; }
.t-btn.save:hover { background: var(--accent2); }
.t-btn.tog { background: var(--bg3); color: var(--text2); }
.t-btn.tog:hover { background: var(--bg4); color: var(--text); }
.t-btn:disabled { opacity: .45; cursor: not-allowed; }

.editor-split { flex: 1; display: flex; overflow: hidden; }
.code-area {
  flex: 1; background: var(--bg); color: var(--text); border: none; outline: none;
  padding: 20px; font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 13px; line-height: 1.65; resize: none; overflow-y: auto;
  tab-size: 2; border-right: 1px solid var(--border);
}
.preview-area {
  flex: 1; overflow-y: auto; padding: 20px 28px; background: var(--bg2);
  transition: all .3s;
}
.preview-area h1 { font-size: 22px; font-weight: 700; color: var(--accent2); margin-bottom: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.preview-area h2 { font-size: 17px; font-weight: 600; color: var(--text); margin: 18px 0 9px; }
.preview-area h3 { font-size: 14px; font-weight: 600; color: var(--text2); margin: 14px 0 7px; }
.preview-area p { color: var(--text2); line-height: 1.7; margin-bottom: 11px; font-size: 13.5px; }
.preview-area ul, .preview-area ol { color: var(--text2); padding-left: 20px; margin-bottom: 11px; }
.preview-area li { line-height: 1.7; font-size: 13.5px; margin-bottom: 3px; }
.preview-area blockquote { border-left: 3px solid var(--accent); padding: 8px 14px; margin: 10px 0; background: var(--bg3); border-radius: 0 6px 6px 0; }
.preview-area blockquote p { margin: 0; color: var(--text2); font-style: italic; }
.preview-area code { background: var(--bg3); color: var(--accent2); padding: 2px 5px; border-radius: 4px; font-family: 'SF Mono', monospace; font-size: 12px; }
.preview-area pre { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 14px; overflow-x: auto; margin-bottom: 12px; }
.preview-area pre code { background: none; padding: 0; color: var(--text); font-size: 12px; }
.preview-area hr { border: none; border-top: 1px solid var(--border); margin: 18px 0; }
.preview-area strong { color: var(--text); }
.preview-area a { color: var(--accent2); }
.preview-area table { width: 100%; border-collapse: collapse; margin-bottom: 12px; font-size: 13px; }
.preview-area th { background: var(--bg3); padding: 7px 11px; text-align: left; font-weight: 600; border: 1px solid var(--border); }
.preview-area td { padding: 6px 11px; border: 1px solid var(--border); color: var(--text2); }

/* ══ Sidebar Config ══ */
.config-view { flex-direction: column; }
.config-head { padding: 12px 20px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.config-head h3 { font-size: 14px; font-weight: 700; flex: 1; }
.config-editor { flex: 1; background: var(--bg); color: var(--text); border: none; outline: none; padding: 20px; font-family: 'SF Mono', monospace; font-size: 12px; line-height: 1.6; resize: none; overflow-y: auto; tab-size: 2; }

/* ══ 部署 ══ */
.deploy-view { flex-direction: column; overflow-y: auto; padding: 24px; gap: 18px; }
.d-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; padding: 20px; }
.d-card h3 { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text2); }
.code-box { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: 'SF Mono', monospace; font-size: 12px; color: var(--green); min-height: 70px; white-space: pre-wrap; word-break: break-all; line-height: 1.6; }
.code-box.dim { color: var(--text3); }
.d-actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
.d-btn { padding: 9px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; display: flex; align-items: center; gap: 6px; }
.d-btn:hover:not(:disabled) { opacity: .85; transform: translateY(-1px); }
.d-btn:disabled { opacity: .4; cursor: not-allowed; }
.d-btn.primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }
.d-btn.sec { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.commit-inp { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-size: 13px; margin-bottom: 12px; }
.commit-inp:focus { outline: none; border-color: var(--accent); }

/* ══ Modal ══ */
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.75); display: flex; align-items: center; justify-content: center; z-index: 8000; backdrop-filter: blur(4px); opacity: 0; pointer-events: none; transition: opacity .25s; }
.modal-bg.show { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 24px; width: 420px; transform: translateY(14px); transition: transform .25s; }
.modal-bg.show .modal { transform: none; }
.modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 18px; }
.f-row { margin-bottom: 12px; }
.f-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; }
.f-inp, .f-sel { width: 100%; background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 9px 12px; color: var(--text); font-size: 13px; }
.f-inp:focus, .f-sel:focus { outline: none; border-color: var(--accent); }
.modal-btns { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
.modal-btns button { padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
.btn-ok { background: var(--accent); color: #fff; }
.btn-ok:hover { background: var(--accent2); }
.btn-cancel { background: var(--bg3); color: var(--text2); }

/* ══ Toast ══ */
.toast { position: fixed; bottom: 24px; right: 24px; padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 600; opacity: 0; transform: translateY(10px); transition: all .3s; z-index: 9999; pointer-events: none; }
.toast.show { opacity: 1; transform: none; }
.toast.s { background: var(--green); color: #fff; }
.toast.e { background: var(--red); color: #fff; }
.toast.i { background: var(--accent); color: #fff; }

.spin { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: sp .7s linear infinite; }
@keyframes sp { to { transform: rotate(360deg); } }
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 10px; }
</style>
</head>
<body>

<!-- 登录页 -->
<div id="login-page">
  <div class="login-box">
    <div class="login-logo">📚</div>
    <div class="login-title">知识库后台</div>
    <div class="login-sub">study.bitdong.xyz · 管理员入口</div>
    <input type="password" class="login-input" id="pwd-input" placeholder="请输入管理密码" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">进入后台</button>
    <div class="login-err" id="login-err"></div>
  </div>
</div>

<!-- 主界面 -->
<div id="app">
  <div class="topbar">
    <span class="logo">📚 知识库</span>
    <button class="nav-btn active" data-view="list" onclick="gotoView('list',this)">文章管理</button>
    <button class="nav-btn" data-view="editor" onclick="gotoView('editor',this)">编辑器</button>
    <button class="nav-btn" data-view="config" onclick="gotoView('config',this)">Sidebar</button>
    <button class="nav-btn" data-view="deploy" onclick="gotoView('deploy',this)">部署</button>
    <span class="spacer"></span>
    <button class="topbar quick-deploy" onclick="quickDeploy()">🚀 一键部署</button>
    <button class="topbar logout" onclick="logout()">退出</button>
  </div>
  <div class="main">

    <!-- 文章列表 -->
    <div class="view list-view active" id="view-list">
      <div class="list-header">
        <h2>📋 文章管理</h2>
        <span class="badge" id="total-badge">--</span>
        <span class="spacer"></span>
        <button class="new-btn" onclick="openNewModal()">＋ 新建文章</button>
      </div>
      <div class="search-wrap">
        <span>🔍</span>
        <input type="text" placeholder="搜索文章标题或路径…" id="search-inp" oninput="filterList()">
      </div>
      <div id="list-body"><div class="loading-text">加载中…</div></div>
    </div>

    <!-- 编辑器 -->
    <div class="view editor-view" id="view-editor">
      <div class="editor-nav">
        <div class="nav-head">
          <span>文章</span>
          <button class="t-btn tog" style="padding:3px 8px;font-size:11px" onclick="refreshNav()">↺</button>
        </div>
        <div class="nav-body" id="editor-nav"></div>
      </div>
      <div class="editor-body">
        <div class="editor-toolbar">
          <span style="font-size:11px;color:var(--text3);font-family:monospace">路径：</span>
          <input type="text" class="path-field" id="edit-path" placeholder="bitdong/wisdom/my-article.md">
          <span class="spacer"></span>
          <button class="t-btn tog" id="toggle-preview-btn" onclick="togglePreview()">隐藏预览</button>
          <button class="t-btn save" id="save-btn" onclick="saveArticle()">💾 保存</button>
        </div>
        <div class="editor-split">
          <textarea class="code-area" id="code-area"
            placeholder="# 文章标题&#10;&#10;在这里写内容…"
            oninput="updatePreview()"
            onkeydown="handleKey(event)"></textarea>
          <div class="preview-area" id="preview-area"></div>
        </div>
      </div>
    </div>

    <!-- Config -->
    <div class="view config-view" id="view-config">
      <div class="config-head">
        <h3>⚙️ config.mts · Sidebar 配置</h3>
        <button class="t-btn tog" onclick="loadConfig()">↺ 刷新</button>
        <button class="t-btn save" onclick="saveConfig()">💾 保存</button>
      </div>
      <textarea class="config-editor" id="config-area" spellcheck="false" onkeydown="handleKey(event)"></textarea>
    </div>

    <!-- 部署 -->
    <div class="view deploy-view" id="view-deploy">
      <div class="d-card">
        <h3>📊 最近提交记录</h3>
        <div class="code-box dim" id="deploy-log">加载中…</div>
        <div class="d-actions">
          <button class="d-btn sec" onclick="loadDeployInfo()">↺ 刷新</button>
          <a href="https://github.com/Bitdong798/study-notes/commits/main" target="_blank">
            <button class="d-btn sec">🐙 GitHub</button>
          </a>
          <a href="https://vercel.com/dashboard" target="_blank">
            <button class="d-btn sec">▲ Vercel</button>
          </a>
        </div>
      </div>
      <div class="d-card">
        <h3>🚀 发布到线上</h3>
        <input type="text" class="commit-inp" id="commit-msg" placeholder="提交说明（留空自动生成）">
        <div class="code-box dim" id="deploy-out">点击发布后日志显示在这里…</div>
        <div class="d-actions">
          <button class="d-btn primary" id="pub-btn" onclick="publish()">🚀 发布到线上</button>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新建文章 Modal -->
<div class="modal-bg" id="new-modal">
  <div class="modal">
    <h3>✏️ 新建文章</h3>
    <div class="f-row">
      <label class="f-label">文章标题</label>
      <input type="text" class="f-inp" id="new-title" placeholder="例：巴菲特的10条投资原则">
    </div>
    <div class="f-row">
      <label class="f-label">保存目录</label>
      <select class="f-sel" id="new-dir"></select>
    </div>
    <div class="f-row">
      <label class="f-label">文件名（英文，不含 .md）</label>
      <input type="text" class="f-inp" id="new-slug" placeholder="例：buffett-10-rules（留空自动生成）">
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('new-modal')">取消</button>
      <button class="btn-ok" onclick="confirmNew()">创建并编辑</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
// ═══ 状态 ═══════════════════════════════════════════════
let TOKEN = localStorage.getItem('admin_token') || '';
let showPreview = true;
let allArticles = []; // flat list

// ═══ Auth ════════════════════════════════════════════════
async function doLogin() {
  const pwd = document.getElementById('pwd-input').value;
  document.getElementById('login-err').textContent = '';
  try {
    const r = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pwd })
    });
    const d = await r.json();
    if (d.success) {
      TOKEN = d.token;
      localStorage.setItem('admin_token', TOKEN);
      showApp();
    } else {
      document.getElementById('login-err').textContent = d.error || '密码错误';
    }
  } catch(e) {
    document.getElementById('login-err').textContent = '网络错误，请重试';
  }
}

function showApp() {
  document.getElementById('login-page').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';
  loadArticles();
}

function logout() {
  TOKEN = '';
  localStorage.removeItem('admin_token');
  location.reload();
}

function api(path, opts = {}) {
  return fetch(path, {
    ...opts,
    headers: { 'x-admin-token': TOKEN, 'Content-Type': 'application/json', ...(opts.headers||{}) }
  }).then(r => r.json());
}

// ═══ 视图切换 ════════════════════════════════════════════
function gotoView(name, btn) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  if (name === 'list') loadArticles();
  if (name === 'editor') refreshNav();
  if (name === 'config') loadConfig();
  if (name === 'deploy') loadDeployInfo();
}

// ═══ 文章列表 ════════════════════════════════════════════
async function loadArticles() {
  document.getElementById('list-body').innerHTML = '<div class="loading-text">拉取文章列表…</div>';
  try {
    const d = await api('/api/articles');
    if (d.error) throw new Error(d.error);

    allArticles = [];
    const container = document.getElementById('list-body');
    container.innerHTML = '';
    let total = 0;

    const catIcons = {
      bitdong:'🎓', guide:'📖', redbook:'📕', defi:'💰', trading:'📈',
      basics:'🔑', tools:'🛠️', wisdom:'💡', classics:'📚',
      original:'✍️', projects:'🏗️', 'trading-secrets':'🤫',
      __root__: '📄'
    };

    for (const [cat, files] of Object.entries(d.grouped)) {
      if (!files.length) continue;
      allArticles.push(...files);
      total += files.length;

      const icon = catIcons[cat] || '📁';
      const sec = document.createElement('div');
      sec.className = 'cat-section';
      sec.innerHTML = `<div class="cat-label">${icon} ${cat === '__root__' ? '根目录' : cat} <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;">${files.length} 篇</span></div><div class="articles-grid" data-cat="${cat}"></div>`;
      container.appendChild(sec);

      const grid = sec.querySelector('.articles-grid');
      files.forEach(f => renderCard(f, grid));
    }

    document.getElementById('total-badge').textContent = total + ' 篇';
  } catch(e) {
    document.getElementById('list-body').innerHTML = `<div class="loading-text" style="color:var(--red)">加载失败：${e.message}</div>`;
    if (e.message.includes('401') || e.message.includes('Unauthorized')) {
      toast('登录已过期', 'e'); logout();
    }
  }
}

function renderCard(f, grid) {
  const card = document.createElement('div');
  card.className = 'a-card';
  card.dataset.title = (f.filename || '');
  card.dataset.path = (f.path || '');
  const kb = f.size ? (f.size/1024).toFixed(1)+'KB' : '--';
  card.innerHTML = `
    <div class="a-actions">
      <button class="a-btn edit" onclick="openArticle('${f.path}',event)">编辑</button>
      <button class="a-btn del" onclick="delArticle('${f.path}','${f.sha}',event)">删除</button>
    </div>
    <div class="a-title">${f.filename}</div>
    <div class="a-path">${f.path}</div>
    <div class="a-meta"><span>${kb}</span></div>
  `;
  card.addEventListener('click', () => openArticle(f.path));
  grid.appendChild(card);
}

function filterList() {
  const q = document.getElementById('search-inp').value.toLowerCase();
  document.querySelectorAll('.a-card').forEach(c => {
    c.style.display = (c.dataset.title+c.dataset.path).toLowerCase().includes(q) ? '' : 'none';
  });
}

// ═══ 编辑器 ══════════════════════════════════════════════
async function openArticle(filePath, event) {
  if (event) event.stopPropagation();
  try {
    const d = await api('/api/article?path=' + encodeURIComponent(filePath));
    if (d.error) throw new Error(d.error);
    document.getElementById('edit-path').value = filePath;
    document.getElementById('code-area').value = d.content;
    updatePreview();
    gotoView('editor');
    refreshNav(filePath);
    toast('已打开 ' + filePath, 'i');
  } catch(e) { toast('打开失败：' + e.message, 'e'); }
}

async function refreshNav(activePath) {
  const nav = document.getElementById('editor-nav');
  nav.innerHTML = '<div style="padding:10px 8px;font-size:12px;color:var(--text3)">加载中…</div>';
  try {
    const d = await api('/api/articles');
    nav.innerHTML = '';
    for (const [cat, files] of Object.entries(d.grouped || {})) {
      if (!files.length) continue;
      const label = document.createElement('div');
      label.className = 'nav-cat';
      label.textContent = cat === '__root__' ? '根目录' : cat;
      nav.appendChild(label);
      files.forEach(f => {
        const item = document.createElement('div');
        item.className = 'nav-item' + (f.path === activePath ? ' active' : '');
        item.textContent = f.filename;
        item.title = f.path;
        item.onclick = () => openArticle(f.path);
        nav.appendChild(item);
      });
    }
  } catch(e) { nav.innerHTML = '加载失败'; }
}

function updatePreview() {
  if (!showPreview) return;
  const md = document.getElementById('code-area').value;
  document.getElementById('preview-area').innerHTML = marked.parse(md);
}

function togglePreview() {
  showPreview = !showPreview;
  const pane = document.getElementById('preview-area');
  pane.style.display = showPreview ? '' : 'none';
  document.getElementById('toggle-preview-btn').textContent = showPreview ? '隐藏预览' : '显示预览';
}

async function saveArticle() {
  const path = document.getElementById('edit-path').value.trim();
  const content = document.getElementById('code-area').value;
  if (!path) return toast('请填写文件路径', 'e');
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.innerHTML = '<span class="spin"></span> 保存中';
  try {
    const d = await api('/api/article', {
      method: 'POST', body: JSON.stringify({ path, content })
    });
    if (d.error) throw new Error(d.error);
    toast('✅ 已保存 · GitHub 自动触发部署', 's');
  } catch(e) { toast('保存失败：' + e.message, 'e'); }
  finally { btn.disabled = false; btn.textContent = '💾 保存'; }
}

function handleKey(e) {
  if (e.key === 'Tab') {
    e.preventDefault();
    const el = e.target, s = el.selectionStart, end = el.selectionEnd;
    el.value = el.value.substring(0, s) + '  ' + el.value.substring(end);
    el.selectionStart = el.selectionEnd = s + 2;
    updatePreview();
  }
  if ((e.metaKey || e.ctrlKey) && e.key === 's') {
    e.preventDefault();
    const view = document.querySelector('.view.active');
    if (view?.id === 'view-editor') saveArticle();
    if (view?.id === 'view-config') saveConfig();
  }
}

// ═══ 删除文章 ════════════════════════════════════════════
async function delArticle(path, sha, event) {
  if (event) event.stopPropagation();
  if (!confirm(`确认删除 "${path}"？此操作不可逆！`)) return;
  try {
    const d = await api('/api/article?path=' + encodeURIComponent(path) + '&sha=' + sha, { method: 'DELETE' });
    if (d.error) throw new Error(d.error);
    toast('已删除：' + path, 's');
    loadArticles();
  } catch(e) { toast('删除失败：' + e.message, 'e'); }
}

// ═══ 新建文章 ════════════════════════════════════════════
const DIRS = [
  '', 'bitdong', 'bitdong/wisdom', 'bitdong/classics', 'bitdong/original',
  'bitdong/projects', 'bitdong/trading-secrets', 'guide', 'redbook',
  'defi', 'trading', 'basics', 'tools'
];

function openNewModal() {
  const sel = document.getElementById('new-dir');
  sel.innerHTML = DIRS.map(d => `<option value="${d}">${d || '根目录（docs/）'}</option>`).join('');
  document.getElementById('new-title').value = '';
  document.getElementById('new-slug').value = '';
  document.getElementById('new-modal').classList.add('show');
  setTimeout(() => document.getElementById('new-title').focus(), 120);
}

function closeModal(id) { document.getElementById(id).classList.remove('show'); }

function confirmNew() {
  const title = document.getElementById('new-title').value.trim();
  const dir = document.getElementById('new-dir').value.trim();
  let slug = document.getElementById('new-slug').value.trim() || ('article-' + Date.now());
  if (!slug.endsWith('.md')) slug += '.md';
  if (!title) return toast('请填写标题', 'e');

  const filePath = dir ? dir + '/' + slug : slug;
  const template = `# ${title}\n\n> 整理：Bit东\n\n## 简介\n\n在这里写文章内容…\n\n## 正文\n\n---\n\n*本文整理自网络，仅供学习参考。*\n`;

  closeModal('new-modal');
  document.getElementById('edit-path').value = filePath;
  document.getElementById('code-area').value = template;
  updatePreview();
  gotoView('editor', document.querySelector('[data-view="editor"]'));
  toast('新建完成，记得 Cmd+S 保存！', 'i');
}

// ═══ Config ══════════════════════════════════════════════
async function loadConfig() {
  document.getElementById('config-area').value = '加载中…';
  try {
    const d = await api('/api/config');
    if (d.error) throw new Error(d.error);
    document.getElementById('config-area').value = d.content;
  } catch(e) { toast('加载配置失败：' + e.message, 'e'); }
}

async function saveConfig() {
  const content = document.getElementById('config-area').value;
  try {
    const d = await api('/api/config', { method: 'POST', body: JSON.stringify({ content }) });
    if (d.error) throw new Error(d.error);
    toast('✅ 配置已保存', 's');
  } catch(e) { toast('保存失败：' + e.message, 'e'); }
}

// ═══ 部署 ════════════════════════════════════════════════
async function loadDeployInfo() {
  const el = document.getElementById('deploy-log');
  el.textContent = '正在读取提交历史…';
  try {
    const r = await fetch(`https://api.github.com/repos/Bitdong798/study-notes/commits?per_page=5`, {
      headers: { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    const commits = await r.json();
    if (!Array.isArray(commits)) throw new Error(commits.message || '获取失败');
    el.textContent = commits.map(c =>
      `${c.sha.slice(0,7)}  ${c.commit.message.split('\n')[0].slice(0,60)}\n         ${new Date(c.commit.author.date).toLocaleString('zh-CN')}`
    ).join('\n\n');
    el.className = 'code-box';
  } catch(e) {
    el.textContent = '获取失败（TOKEN可能无效）：' + e.message;
  }
}

async function publish() {
  const msg = document.getElementById('commit-msg').value.trim();
  const btn = document.getElementById('pub-btn');
  const out = document.getElementById('deploy-out');

  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> 发布中…';
  out.textContent = '提交正在进行，通常仅需几秒…\n（保存文章时已触发 GitHub push，此按钮为手动触发补充提交）';
  out.className = 'code-box';

  // 注：GitHub API 逐文件保存，每次保存就是一次 commit
  // 这里做一个"空提交"来手动触发 Vercel 重新部署
  try {
    // 读取当前 README（如有）或 index.md 来做一次无改动的刷新 commit
    const r = await fetch('https://api.github.com/repos/Bitdong798/study-notes/contents/docs/index.md', {
      headers: { 'Authorization': 'token ' + TOKEN, 'Accept': 'application/vnd.github.v3+json' }
    });
    const file = await r.json();
    const content = atob(file.content.replace(/\n/g,''));

    // 重新写回（触发 webhook）
    const commitMsg = msg || ('deploy: 手动触发部署 ' + new Date().toLocaleString('zh-CN'));
    await fetch('https://api.github.com/repos/Bitdong798/study-notes/contents/docs/index.md', {
      method: 'PUT',
      headers: {
        'Authorization': 'token ' + TOKEN,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        message: commitMsg,
        content: btoa(unescape(encodeURIComponent(content))),
        sha: file.sha,
        branch: 'main'
      })
    });

    out.textContent = `✅ 已触发部署！\n提交：${commitMsg}\n\nVercel 通常 30-60 秒内完成构建，请稍候…`;
    toast('🚀 已触发 Vercel 部署', 's');
    setTimeout(loadDeployInfo, 3000);
  } catch(e) {
    out.textContent = '失败：' + e.message;
    toast('触发失败：' + e.message, 'e');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🚀 发布到线上';
  }
}

async function quickDeploy() {
  toast('每次保存文章都会自动 push 到 GitHub 并触发 Vercel 部署 🚀', 'i');
}

// ═══ Toast ═══════════════════════════════════════════════
let _tt = null;
function toast(msg, type = 'i') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast ' + type + ' show';
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3500);
}

// ═══ 初始化 ═══════════════════════════════════════════════
window.addEventListener('DOMContentLoaded', () => {
  if (TOKEN) {
    // 尝试用已存 token 直接进入
    showApp();
  }
  document.getElementById('new-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('new-modal')) closeModal('new-modal');
  });
  document.getElementById('pwd-input').focus();
});
</script>
